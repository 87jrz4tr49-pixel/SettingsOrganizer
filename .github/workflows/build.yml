name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Theos and SDK
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          cd $HOME/theos
          git clone https://github.com/theos/sdks.git sdks
          cd sdks
          # Создаём символическую ссылку на нужную версию SDK
          ln -sf iPhoneOS16.0.sdk iPhoneOS.sdk
      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          cd $GITHUB_WORKSPACE
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: SettingsOrganizer.deb
          path: packages/*.deb